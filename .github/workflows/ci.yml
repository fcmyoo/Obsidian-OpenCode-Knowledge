name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  kb-lint:
    uses: ./.github/workflows/kb-lint.yml

  test-project-kb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run project KB tests
        run: python -m unittest tests.test_project_kb -v

  test-project-kb-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run project KB tests
        run: python -m unittest tests.test_project_kb -v

  installer-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run installer dry-run
        run: bash scripts/installer/install.sh --vault "${{ github.workspace }}/tmp-install-smoke" --provider deepseek --api-key "test-key" --skip-plugin
      - name: Verify vault template copied
        run: test -d "${{ github.workspace }}/tmp-install-smoke/wiki"
      - name: Cleanup
        run: rm -rf "${{ github.workspace }}/tmp-install-smoke"

  kb-quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up test vault
        run: |
          mkdir -p "${{ github.workspace }}/tmp-quality-vault/wiki"
          cp README.md "${{ github.workspace }}/tmp-quality-vault/wiki/README.md"
          cp README.en.md "${{ github.workspace }}/tmp-quality-vault/wiki/README.en.md"
          cat > "${{ github.workspace }}/tmp-quality-vault/wiki/index.md" <<'EOF'
          # Index
          - [README](README.md)
          - [README](README.en.md)
          EOF
      - name: Run quality check
        run: bash scripts/kb-quality-check.sh "${{ github.workspace }}/tmp-quality-vault"
      - name: Cleanup
        run: rm -rf "${{ github.workspace }}/tmp-quality-vault"
