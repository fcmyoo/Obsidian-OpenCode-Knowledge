name: Installer Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  installer-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run installer dry-run
        run: bash scripts/installer/install.sh --vault "${{ github.workspace }}/tmp-install-smoke" --provider deepseek --api-key "test-key" --skip-plugin

      - name: Verify vault template copied
        run: test -d "${{ github.workspace }}/tmp-install-smoke/wiki"

      - name: Cleanup
        run: rm -rf "${{ github.workspace }}/tmp-install-smoke"
